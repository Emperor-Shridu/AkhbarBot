services:
  - type: web
    name: akhbarbot-backend
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: MONGO_URI
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: ALLOWED_CHAT_ID
        sync: false
      - key: STREAMLIT_USER_IDS
        value: demo
      - key: API_SHARED_SECRET
        generateValue: true
       - key: GEMINI_MODEL
         value: gemini-2.5-flash-lite

